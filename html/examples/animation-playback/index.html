<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Animation Playback — Unity → HTML Playground</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <a class="back" href="../../index.html">← back</a>
    <div id="game"></div>
    <div class="hud">
      <button id="btn-play" type="button">Pause</button>
      <button id="btn-restart" type="button">Restart</button>
      <label class="speed">
        <span>Speed</span>
        <input id="speed" type="range" min="0.25" max="2" step="0.05" value="1" />
        <output id="speed-out">1.00×</output>
      </label>
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
